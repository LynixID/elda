{% load static %}
<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lupa Password - Harmoni Agro</title>
  <link rel="stylesheet" href="{% static 'kasir/css/login.css' %}">
</head>
<body>
  <div class="page">
    <div class="haze" aria-hidden="true"></div>
    <div class="seam" aria-hidden="true"></div>

    <section class="left" aria-hidden="true">
      <div class="left-overlay"></div>
    </section>

    <section class="right">
      <div class="right-bg">
        <div class="card">
          <h1>LUPA PASSWORD</h1>

          {% if messages %}
            <div class="alert">
              {% for message in messages %}
                <div class="msg {{ message.tags }}">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}

          <form method="post" class="form" autocomplete="off">
            {% csrf_token %}

            <label class="label">👤 <span>Username</span></label>
            <input
              name="username"
              type="text"
              class="input"
              placeholder="Masukkan username"
              value="{{ request.POST.username|default_if_none:'' }}"
              required
              autocomplete="username"
            >

            <label class="label">🔒 <span>Password Lama</span></label>
            <div class="pw-wrap">
              <input
                id="pw_lama"
                name="password_lama"
                type="password"
                class="input"
                placeholder="Masukkan password lama"
                required
                autocomplete="current-password"
              >
              <button
                class="pw-toggle"
                type="button"
                data-target="pw_lama"
                aria-label="Tampilkan password"
                title="Tampilkan/Sembunyikan"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"></path>
                  <path d="M12 15.5A3.5 3.5 0 1 0 12 8.5a3.5 3.5 0 0 0 0 7Z"></path>
                </svg>
              </button>
            </div>

            <label class="label">🆕 <span>Password Baru</span></label>
            <div class="pw-wrap">
              <input
                id="pw_baru"
                name="password_baru"
                type="password"
                class="input"
                placeholder="Masukkan password baru"
                required
                autocomplete="new-password"
              >
              <button
                class="pw-toggle"
                type="button"
                data-target="pw_baru"
                aria-label="Tampilkan password"
                title="Tampilkan/Sembunyikan"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"></path>
                  <path d="M12 15.5A3.5 3.5 0 1 0 12 8.5a3.5 3.5 0 0 0 0 7Z"></path>
                </svg>
              </button>
            </div>

            <label class="label">🔁 <span>Ulangi Password Baru</span></label>
            <div class="pw-wrap">
              <input
                id="pw_konfirmasi"
                name="konfirmasi_password"
                type="password"
                class="input"
                placeholder="Ulangi password baru"
                required
                autocomplete="new-password"
              >
              <button
                class="pw-toggle"
                type="button"
                data-target="pw_konfirmasi"
                aria-label="Tampilkan password"
                title="Tampilkan/Sembunyikan"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"></path>
                  <path d="M12 15.5A3.5 3.5 0 1 0 12 8.5a3.5 3.5 0 0 0 0 7Z"></path>
                </svg>
              </button>
            </div>

            <button class="btn" type="submit">Simpan</button>

            <div style="margin-top:10px; text-align:center;">
              <a class="forgot" href="{% url 'kasir:login' %}">Kembali ke Login</a>
            </div>
          </form>
        </div>

        <div class="leaf-bottom" aria-hidden="true"></div>
      </div>
    </section>
  </div>

  <script src="{% static 'kasir/js/password.js' %}"></script>
</body>
</html>
